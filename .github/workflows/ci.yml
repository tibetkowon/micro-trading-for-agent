name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Go Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Format check
        run: |
          gofmt_out=$(gofmt -l .)
          if [ -n "$gofmt_out" ]; then
            echo "The following files need formatting:"
            echo "$gofmt_out"
            exit 1
          fi

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test ./...

  frontend:
    name: React Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to NCP
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # PR은 배포하지 않고 main 브랜치 push 시에만 배포
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # 1. Go 바이너리 빌드 (linux/amd64 — runner와 동일 플랫폼, CGO 활성화)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build Go binary (linux/amd64)
        working-directory: backend
        run: |
          go mod download
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o server ./cmd/server

      # 2. React 빌드
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 3. SSH 키 설정
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.NCP_HOST }} >> ~/.ssh/known_hosts

      # 4. 서비스 중지 후 파일 전송
      - name: Deploy files to server
        run: |
          # 서비스 중지 (바이너리 파일 잠금 해제)
          ssh ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "systemctl stop micro-trading || true"

          # 디렉토리 구조 생성 (data/: SQLite 파일 경로)
          ssh ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "mkdir -p /service/micro-trading-for-agent/frontend /service/micro-trading-for-agent/data"

          # Go 바이너리 전송
          scp backend/server \
            ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}:/service/micro-trading-for-agent/server

          # React 빌드 결과물 전송
          rsync -az --delete frontend/dist/ \
            ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}:/service/micro-trading-for-agent/frontend/dist/

      # 5. 서비스 시작 및 기동 확인
      - name: Start service and verify
        run: |
          ssh ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "chmod +x /service/micro-trading-for-agent/server && \
             systemctl start micro-trading && \
             sleep 3 && \
             systemctl is-active --quiet micro-trading && \
             echo 'Service is running' || \
             (journalctl -u micro-trading --no-pager -n 30; exit 1)"
